name: OpenVidu integration tests
on:
  push:
    branches:
      - master
    paths:
      - "openvidu-test-integration/**"
      - ".github/workflows/openvidu-integration-tests.yml"
  workflow_dispatch:

jobs:
  integration-tests:
    name: Integration tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Configure OpenVidu Local Deployment
        uses: OpenVidu/actions/start-openvidu-local-deployment@974fe3ea43a038d0224bd293131c4087b539a722 # v1.0.6
        with:
          ref-openvidu-local-deployment: development
          pre_startup_commands: |
            sed -i 's/interval: 10s/interval: 1s/' livekit.yaml
            sed -i '/interval: 1s/a \        fixer_interval: 10s' livekit.yaml
      - name: Install LiveKit CLI
        run: |
          curl -sSL https://get.livekit.io/cli | bash

      - name: Checkout current repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: openvidu

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: ./openvidu/openvidu-test-integration
        run: npm ci

      - name: Run tests
        working-directory: ./openvidu/openvidu-test-integration
        run: npm run test:ci

      - name: Upload report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: openvidu-integration-tests-report
          path: ./openvidu/openvidu-test-integration/test-results.json
          retention-days: 7
      - name: Cleanup
        if: always()
        uses: OpenVidu/actions/cleanup@974fe3ea43a038d0224bd293131c4087b539a722 # v1.0.6

